<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ahmadAI - AI News Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff00ff;
            --tertiary: #00ff88;
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --dark-card-hover: #1a1a25;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --border: rgba(255, 255, 255, 0.06);
            --linkedin-blue: #0a66c2;
            --reddit-orange: #ff4500;
            --youtube-red: #ff0000;
            --hn-orange: #ff6600;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow-1 {
            top: -200px;
            left: -200px;
            background: var(--primary);
        }
        
        .bg-glow-2 {
            bottom: -200px;
            right: -200px;
            background: var(--secondary);
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .header .last-update {
            font-size: 0.8rem;
            color: var(--primary);
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: color 0.3s;
        }
        
        .nav-back:hover {
            color: var(--primary);
        }
        
        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0 auto 25px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .refresh-btn i {
            transition: transform 0.5s;
        }
        
        .refresh-btn.loading i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .tab {
            padding: 10px 18px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
        }
        
        .tab:hover {
            border-color: var(--primary);
            color: var(--text);
        }
        
        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--dark);
            font-weight: 600;
        }
        
        .tab.reddit.active { background: var(--reddit-orange); border-color: var(--reddit-orange); }
        .tab.youtube.active { background: var(--youtube-red); border-color: var(--youtube-red); }
        .tab.hackernews.active { background: var(--hn-orange); border-color: var(--hn-orange); }
        .tab.blog.active { background: var(--tertiary); border-color: var(--tertiary); color: var(--dark); }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .news-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .news-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        
        .news-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .source-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
            flex-shrink: 0;
        }
        
        .source-avatar.reddit { background: var(--reddit-orange); }
        .source-avatar.youtube { background: var(--youtube-red); }
        .source-avatar.hackernews { background: var(--hn-orange); }
        .source-avatar.blog { background: var(--tertiary); }
        .source-avatar.google { background: var(--primary); }
        
        .source-info {
            flex: 1;
            min-width: 0;
        }
        
        .source-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        
        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .post-meta .dot {
            width: 3px;
            height: 3px;
            background: var(--text-muted);
            border-radius: 50%;
        }
        
        .category-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .category-badge.launch {
            background: rgba(0, 255, 136, 0.15);
            color: var(--tertiary);
        }
        
        .category-badge.news {
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary);
        }
        
        .category-badge.research {
            background: rgba(255, 0, 255, 0.15);
            color: var(--secondary);
        }
        
        .category-badge.tutorial {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
        }
        
        .news-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .news-summary {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .news-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background: var(--dark);
        }
        
        .news-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .engagement {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .engagement-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .engagement-item i {
            font-size: 0.9rem;
        }
        
        .open-link {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        
        .open-link:hover {
            opacity: 0.8;
        }
        
        .loading-skeleton {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,0.05) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        .skeleton-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .skeleton-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .skeleton-text {
            flex: 1;
        }
        
        .skeleton-line {
            height: 14px;
            margin-bottom: 8px;
        }
        
        .skeleton-line:last-child {
            width: 60%;
            margin-bottom: 0;
        }
        
        .skeleton-title {
            height: 20px;
            width: 85%;
            margin-bottom: 12px;
        }
        
        .skeleton-summary {
            height: 60px;
            margin-bottom: 15px;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .news-card.hidden {
            display: none;
        }
        
        .load-more {
            text-align: center;
            padding: 30px;
        }
        
        .load-more-btn {
            padding: 14px 30px;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .load-more-btn:hover {
            background: var(--primary);
            color: var(--dark);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .tabs {
                gap: 6px;
            }
            
            .tab {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            
            .news-card {
                padding: 16px;
            }
            
            .news-title {
                font-size: 1rem;
            }
            
            .news-thumbnail {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <div class="container">
        <a href="index.html" class="nav-back">
            <i class="fas fa-arrow-left"></i>
            Back to Portfolio
        </a>
        
        <div class="header">
            <h1>AI News</h1>
            <p>Your AI News Feed - Powered by CrewAI</p>
            <p class="last-update" id="lastUpdate">Loading...</p>
        </div>
        
        <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">
            <i class="fas fa-sync-alt"></i>
            Refresh News
        </button>
        
        <div class="tabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="launch">Launch</button>
            <button class="tab" data-filter="news">News</button>
            <button class="tab" data-filter="research">Research</button>
            <button class="tab" data-filter="tutorial">Tutorial</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search AI news..." oninput="filterNews()">
        </div>
        
        <div class="news-feed" id="newsFeed">
            <div class="loading-skeleton">
                <div class="skeleton-header">
                    <div class="skeleton skeleton-avatar"></div>
                    <div class="skeleton-text">
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line"></div>
                    </div>
                </div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-summary"></div>
            </div>
            <div class="loading-skeleton">
                <div class="skeleton-header">
                    <div class="skeleton skeleton-avatar"></div>
                    <div class="skeleton-text">
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line"></div>
                    </div>
                </div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-summary"></div>
            </div>
            <div class="loading-skeleton">
                <div class="skeleton-header">
                    <div class="skeleton skeleton-avatar"></div>
                    <div class="skeleton-text">
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line"></div>
                    </div>
                </div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-summary"></div>
            </div>
        </div>
        
        <div class="load-more" id="loadMore" style="display: none;">
            <button class="load-more-btn" onclick="loadMore()">Load More</button>
        </div>
    </div>
    
    <script>
        let allNews = [];
        let displayedCount = 0;
        let currentFilter = 'all';
        let searchQuery = '';
        const ITEMS_PER_PAGE = 20;
        
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                
                if (data.news && data.news.length > 0) {
                    allNews = data.news;
                    displayedCount = 0;
                    renderNews();
                    document.getElementById('lastUpdate').textContent = `Updated: ${data.last_update || 'Just now'}`;
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading news:', error);
                showEmptyState();
            }
        }
        
        function renderNews() {
            const feed = document.getElementById('newsFeed');
            const loadMore = document.getElementById('loadMore');
            
            let filtered = allNews;
            
            if (currentFilter !== 'all') {
                filtered = allNews.filter(item => 
                    item.category && item.category.toLowerCase() === currentFilter.toLowerCase()
                );
            }
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(query) ||
                    item.summary.toLowerCase().includes(query) ||
                    item.source.toLowerCase().includes(query)
                );
            }
            
            if (filtered.length === 0) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-newspaper"></i>
                        <h3>No news found</h3>
                        <p>Try a different filter or search term</p>
                    </div>
                `;
                loadMore.style.display = 'none';
                return;
            }
            
            const itemsToShow = filtered.slice(0, displayedCount + ITEMS_PER_PAGE);
            
            if (displayedCount === 0) {
                feed.innerHTML = '';
            }
            
            itemsToShow.forEach((item, index) => {
                if (index >= displayedCount) {
                    const card = createNewsCard(item);
                    feed.appendChild(card);
                }
            });
            
            displayedCount = itemsToShow.length;
            
            if (displayedCount < filtered.length) {
                loadMore.style.display = 'block';
            } else {
                loadMore.style.display = 'none';
            }
        }
        
        function createNewsCard(item) {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.onclick = () => window.open(item.url, '_blank');
            
            const sourceType = item.source_type || 'blog';
            const category = item.category || 'News';
            const summary = item.summary || '';
            const thumbnail = item.thumbnail || '';
            
            const timeAgo = getTimeAgo(item.published_at);
            
            card.innerHTML = `
                <div class="news-card-header">
                    <div class="source-avatar ${sourceType}">
                        ${getSourceIcon(sourceType, item.source)}
                    </div>
                    <div class="source-info">
                        <div class="source-name">${item.source || 'Unknown'}</div>
                        <div class="post-meta">
                            <span>${timeAgo}</span>
                            <span class="dot"></span>
                            <span>${sourceType.charAt(0).toUpperCase() + sourceType.slice(1)}</span>
                        </div>
                    </div>
                    <span class="category-badge ${category.toLowerCase()}">${category}</span>
                </div>
                <div class="news-title">${item.title}</div>
                ${summary ? `<div class="news-summary">${summary}</div>` : ''}
                ${thumbnail ? `<img src="${thumbnail}" class="news-thumbnail" alt="thumbnail" onerror="this.style.display='none'">` : ''}
                <div class="news-card-footer">
                    <div class="engagement">
                        <div class="engagement-item">
                            <i class="fas fa-fire"></i>
                            ${item.trending_score || 0}
                        </div>
                    </div>
                    <a href="${item.url}" target="_blank" class="open-link" onclick="event.stopPropagation()">
                        Read More <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            `;
            
            return card;
        }
        
        function getSourceIcon(type, source) {
            const icons = {
                reddit: '<i class="fab fa-reddit-alien"></i>',
                youtube: '<i class="fab fa-youtube"></i>',
                hackernews: '<i class="fab fa-hacker-news"></i>',
                blog: '<i class="fas fa-blog"></i>',
                google: '<i class="fab fa-google"></i>'
            };
            
            if (type === 'reddit') return '<i class="fab fa-reddit-alien"></i>';
            if (type === 'youtube') return '<i class="fab fa-youtube"></i>';
            if (type === 'hackernews') return '<i class="fab fa-hacker-news"></i>';
            if (type === 'blog') {
                if (source && source.toLowerCase().includes('openai')) return 'O';
                if (source && source.toLowerCase().includes('google')) return 'G';
                if (source && source.toLowerCase().includes('meta')) return 'M';
                if (source && source.toLowerCase().includes('microsoft')) return 'M';
                if (source && source.toLowerCase().includes('anthropic')) return 'A';
                return '<i class="fas fa-globe"></i>';
            }
            return '<i class="fas fa-newspaper"></i>';
        }
        
        function getTimeAgo(dateStr) {
            if (!dateStr) return 'Recently';
            
            try {
                const date = new Date(dateStr);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);
                
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString();
            } catch (e) {
                return 'Recently';
            }
        }
        
        function filterNews() {
            searchQuery = document.getElementById('searchInput').value;
            displayedCount = 0;
            renderNews();
        }
        
        function loadMore() {
            renderNews();
        }
        
        async function refreshNews() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refreshing...';
            
            try {
                const response = await fetch('/api/news/refresh', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    await loadNews();
                    btn.innerHTML = '<i class="fas fa-check"></i> Updated!';
                    setTimeout(() => {
                        btn.classList.remove('loading');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh News';
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Failed to refresh');
                }
            } catch (error) {
                console.error('Refresh error:', error);
                btn.innerHTML = '<i class="fas fa-times"></i> Error - Try Again';
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh News';
                }, 3000);
            }
        }
        
        function showEmptyState() {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-robot"></i>
                    <h3>No AI news yet</h3>
                    <p>Click "Refresh News" to fetch the latest AI updates</p>
                </div>
            `;
            document.getElementById('loadMore').style.display = 'none';
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                displayedCount = 0;
                renderNews();
            });
        });
        
        loadNews();
        
        setInterval(async () => {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                if (data.last_update) {
                    document.getElementById('lastUpdate').textContent = `Updated: ${data.last_update}`;
                }
            } catch (e) {}
        }, 60000);
    </script>
</body>
</html>
