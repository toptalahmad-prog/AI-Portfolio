<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JogiWorld - Third Person Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #00f0ff;
            --secondary: #ff00ff;
            --tertiary: #00ff88;
            --dark: #000000;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Rajdhani', sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        .controls-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,240,255,0.3);
            border-radius: 10px;
            padding: 15px 20px;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }
        
        .controls-info h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        
        .controls-info span {
            color: var(--tertiary);
            font-weight: 600;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            opacity: 0.7;
        }
        
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: var(--primary);
        }
        
        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        
        .crosshair::after {
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        
        .crosshair.active {
            opacity: 1;
            animation: pulse 0.5s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }
        
        .info-panel {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(0,240,255,0.4);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(15px);
            display: none;
            pointer-events: auto;
        }
        
        .info-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50%) translateX(20px); }
            to { opacity: 1; transform: translateY(-50%) translateX(0); }
        }
        
        .info-panel h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .info-panel p {
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .info-panel .action-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            text-transform: uppercase;
        }
        
        .info-panel .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,240,255,0.4);
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        
        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-bar-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }
        
        .click-to-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .click-to-start h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px var(--primary); }
            50% { text-shadow: 0 0 40px var(--secondary); }
        }
        
        .click-to-start p {
            color: rgba(255,255,255,0.6);
        }

        @media (max-width: 768px) {
            .top-bar { padding: 15px 20px; }
            .nav-links { display: none; }
            .controls-info { bottom: 20px; left: 20px; padding: 10px 15px; font-size: 0.75rem; }
            .info-panel { right: 10px; left: 10px; width: auto; top: auto; bottom: 100px; transform: none; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h1>JOGIWORLD</h1>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loadingFill"></div>
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="hud">
        <div class="top-bar">
            <div class="logo">JOGIWORLD</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/chatbot">JOGI AI</a>
                <a href="/book">Book Meeting</a>
                <a href="/ahmadAdmin">Admin</a>
            </div>
        </div>
        
        <div class="click-to-start" id="clickToStart">
            <h2>CLICK TO START</h2>
            <p>Use WASD to move • Mouse to look • Click objects to interact</p>
        </div>
        
        <div class="crosshair" id="crosshair"></div>
        
        <div class="controls-info">
            <h4>CONTROLS</h4>
            <p><span>W A S D</span> - Move Character</p>
            <p><span>MOUSE</span> - Camera Look</p>
            <p><span>SHIFT</span> - Sprint</p>
            <p><span>CLICK</span> - Interact</p>
            <p><span>ESC</span> - Pause</p>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <button class="close-btn" onclick="closeInfoPanel()">×</button>
            <h3 id="infoTitle">Object Name</h3>
            <p id="infoDescription">Description goes here...</p>
            <a href="#" class="action-btn" id="infoAction">Learn More</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    
    <script>
        // Scene Setup
        let scene, camera, renderer, controls;
        let player, playerMixer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        let raycaster;
        let interactableObjects = [];
        let isLocked = false;
        let cameraAngle = 0;
        let cameraPitch = 0.3;
        let cameraDistance = 8;
        
        const primaryColor = 0x00f0ff;
        const secondaryColor = 0xff00ff;
        const tertiaryColor = 0x00ff88;
        
        const objectData = {
            'Xynova Core': { title: 'XYNOVA', description: 'Building metaverse platforms, VR/AR, Web3 solutions.', link: '/' },
            'Metaverse': { title: 'METAVERSE', description: '5+ years of immersive tech experience.', link: '/#expertise' },
            'VR/AR': { title: 'VR/AR LAB', description: 'Virtual and augmented reality experiences.', link: '/#projects' },
            'Web3': { title: 'WEB3 HUB', description: 'Blockchain, NFTs, and decentralized apps.', link: '/#expertise' },
            'Game Dev': { title: 'GAME DEV', description: 'Creating awesome games with Unity.', link: '/#projects' },
            'AI': { title: 'AI INTELLIGENCE', description: 'Smart automation solutions.', link: '/#expertise' },
            'Book': { title: 'BOOK MEETING', description: 'Schedule a call with Muhammad Ahmad.', link: '/book' },
            'Contact': { title: 'GET IN TOUCH', description: 'Let\'s work together!', link: '/#contact' }
        };
        
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.012);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            raycaster = new THREE.Raycaster();
            
            createPlayer();
            createEnvironment();
            createInteractiveObjects();
            createParticles();
            createGrid();
            
            // Lights
            const ambient = new THREE.AmbientLight(0x111111);
            scene.add(ambient);
            
            const light1 = new THREE.PointLight(primaryColor, 1.5, 100);
            light1.position.set(15, 20, 15);
            scene.add(light1);
            
            const light2 = new THREE.PointLight(secondaryColor, 1.5, 100);
            light2.position.set(-15, 20, -15);
            scene.add(light2);
            
            // Events
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
            
            // Click to start
            document.getElementById('clickToStart').addEventListener('click', () => {
                document.getElementById('clickToStart').style.display = 'none';
                renderer.domElement.requestPointerLock();
            });
            
            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === renderer.domElement;
                document.getElementById('clickToStart').style.display = isLocked ? 'none' : 'block';
            });
            
            setTimeout(() => {
                document.getElementById('loadingFill').style.width = '100%';
                setTimeout(() => document.getElementById('loading').classList.add('hide'), 500);
            }, 1000);
            
            animate();
        }
        
        function createPlayer() {
            player = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: primaryColor,
                metalness: 0.7,
                roughness: 0.3,
                emissive: primaryColor,
                emissiveIntensity: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.2;
            body.castShadow = true;
            player.add(body);
            
            // Head
            const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({
                color: secondaryColor,
                metalness: 0.8,
                roughness: 0.2,
                emissive: secondaryColor,
                emissiveIntensity: 0.3
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.1;
            head.castShadow = true;
            player.add(head);
            
            // Visor
            const visorGeo = new THREE.BoxGeometry(0.5, 0.15, 0.2);
            const visorMat = new THREE.MeshStandardMaterial({
                color: 0x000000,
                metalness: 1,
                roughness: 0
            });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 2.15, 0.25);
            player.add(visor);
            
            // Glow ring around player
            const ringGeo = new THREE.TorusGeometry(1.2, 0.03, 8, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: primaryColor,
                transparent: true,
                opacity: 0.5
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.1;
            player.add(ring);
            
            player.position.set(0, 0, 10);
            scene.add(player);
        }
        
        function createEnvironment() {
            // Ground
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x050510,
                metalness: 0.9,
                roughness: 0.3
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Stars
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 3000;
            const posArray = new Float32Array(starsCount * 3);
            for(let i = 0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 200;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMat = new THREE.PointsMaterial({ size: 0.15, color: primaryColor, transparent: true, opacity: 0.8 });
            scene.add(new THREE.Points(starsGeo, starsMat));
        }
        
        function createInteractiveObjects() {
            const platforms = [
                { pos: [0, 0, 0], color: primaryColor, name: 'Xynova Core', scale: 2 },
                { pos: [-10, 0, -8], color: secondaryColor, name: 'Metaverse', scale: 1.5 },
                { pos: [10, 0, -8], color: tertiaryColor, name: 'VR/AR', scale: 1.5 },
                { pos: [-10, 0, 8], color: 0xffaa00, name: 'Web3', scale: 1.5 },
                { pos: [10, 0, 8], color: 0xff0066, name: 'Game Dev', scale: 1.5 },
                { pos: [0, 0, -15], color: primaryColor, name: 'AI', scale: 1.5 },
                { pos: [0, 0, 20], color: secondaryColor, name: 'Book', scale: 1.5 }
            ];
            
            platforms.forEach(p => {
                // Platform base
                const platGeo = new THREE.CylinderGeometry(p.scale * 0.8, p.scale, 0.3, 6);
                const platMat = new THREE.MeshStandardMaterial({
                    color: p.color,
                    metalness: 0.8,
                    roughness: 0.2,
                    emissive: p.color,
                    emissiveIntensity: 0.2
                });
                const platform = new THREE.Mesh(platGeo, platMat);
                platform.position.set(...p.pos);
                platform.position.y = -0.35;
                scene.add(platform);
                
                // Floating object
                let objGeo;
                if (p.name === 'Xynova Core') {
                    objGeo = new THREE.IcosahedronGeometry(p.scale, 1);
                } else if (p.name === 'Book') {
                    objGeo = new THREE.TorusGeometry(p.scale * 0.6, 0.2, 8, 32);
                } else if (p.name === 'AI') {
                    objGeo = new THREE.OctahedronGeometry(p.scale * 0.7, 0);
                } else {
                    objGeo = new THREE.DodecahedronGeometry(p.scale * 0.7, 0);
                }
                
                const objMat = new THREE.MeshStandardMaterial({
                    color: p.color,
                    metalness: 0.9,
                    roughness: 0.1,
                    emissive: p.color,
                    emissiveIntensity: 0.5
                });
                const obj = new THREE.Mesh(objGeo, objMat);
                obj.position.set(p.pos[0], p.pos[1] + p.scale + 1, p.pos[2]);
                obj.userData = { name: p.name, originalY: obj.position.y };
                scene.add(obj);
                interactableObjects.push(obj);
                
                // Glow sphere
                const glowGeo = new THREE.SphereGeometry(p.scale, 32, 32);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: p.color,
                    transparent: true,
                    opacity: 0.08
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(obj.position);
                scene.add(glow);
            });
        }
        
        function createParticles() {
            const particlesGeo = new THREE.BufferGeometry();
            const particlesCount = 500;
            const posArray = new Float32Array(particlesCount * 3);
            for(let i = 0; i < particlesCount * 3; i += 3) {
                posArray[i] = (Math.random() - 0.5) * 50;
                posArray[i + 1] = Math.random() * 15;
                posArray[i + 2] = (Math.random() - 0.5) * 50;
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMat = new THREE.PointsMaterial({ size: 0.08, color: primaryColor, transparent: true, opacity: 0.5 });
            scene.add(new THREE.Points(particlesGeo, particlesMat));
        }
        
        function createGrid() {
            const grid = new THREE.GridHelper(100, 40, primaryColor, 0x111122);
            grid.position.y = -0.48;
            grid.material.opacity = 0.25;
            grid.material.transparent = true;
            scene.add(grid);
        }
        
        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        }
        
        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }
        
        function onMouseMove(e) {
            if (!isLocked) return;
            
            cameraAngle -= e.movementX * 0.002;
            cameraPitch -= e.movementY * 0.002;
            cameraPitch = Math.max(-0.5, Math.min(1.2, cameraPitch));
        }
        
        function onClick() {
            if (!isLocked) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(interactableObjects);
            
            if (intersects.length > 0 && intersects[0].distance < 20) {
                const obj = intersects[0].object;
                if (obj.userData?.name) {
                    showInfoPanel(obj.userData.name);
                }
            }
        }
        
        function showInfoPanel(name) {
            const data = objectData[name];
            if (!data) return;
            
            document.getElementById('infoTitle').textContent = data.title;
            document.getElementById('infoDescription').textContent = data.description;
            document.getElementById('infoAction').href = data.link;
            document.getElementById('infoPanel').classList.add('show');
            document.getElementById('crosshair').classList.add('active');
        }
        
        function closeInfoPanel() {
            document.getElementById('infoPanel').classList.remove('show');
            document.getElementById('crosshair').classList.remove('active');
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            
            if (isLocked) {
                // Player movement
                const speed = e.shiftKey ? 15 : 8;
                
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                
                if (moveForward || moveBackward) {
                    player.position.z -= direction.z * speed * delta;
                }
                if (moveLeft || moveRight) {
                    player.position.x -= direction.x * speed * delta;
                }
                
                // Keep player in bounds
                player.position.x = Math.max(-45, Math.min(45, player.position.x));
                player.position.z = Math.max(-45, Math.min(45, player.position.z));
                
                // Rotate player to face movement direction
                if (direction.length() > 0) {
                    const targetAngle = Math.atan2(direction.x, direction.z);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetAngle + cameraAngle, 0.1);
                }
            }
            
            // Third-person camera
            const targetCamX = player.position.x + Math.sin(cameraAngle) * cameraDistance;
            const targetCamY = player.position.y + 3 + cameraPitch * cameraDistance;
            const targetCamZ = player.position.z + Math.cos(cameraAngle) * cameraDistance;
            
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, targetCamX, 0.1);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, targetCamY, 0.1);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetCamZ, 0.1);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            
            // Animate objects
            interactableObjects.forEach(obj => {
                if (obj.userData?.originalY) {
                    obj.position.y = obj.userData.originalY + Math.sin(time * 0.001 + obj.position.x) * 0.3;
                    obj.rotation.x += 0.005;
                    obj.rotation.y += 0.008;
                }
            });
            
            prevTime = time;
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
