<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Muhammad Ahmad Humayoun</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #00f0ff; 
            --secondary: #ff00ff; 
            --tertiary: #00ff88; 
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --text: #ffffff;
            --text-muted: #a0a0b0;
        }

        [data-theme="light"] {
            --primary: #00a8b5;
            --secondary: #cc00cc;
            --tertiary: #00cc70;
            --dark: #f5f5f7;
            --dark-card: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            min-height: 100vh; 
            overflow: hidden; 
            color: var(--text); 
            user-select: none; 
        }
        
        /* Ambient Background Glows */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation: floatGlow 15s ease-in-out infinite;
        }
        .glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.12) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation: floatGlow 18s ease-in-out infinite reverse;
        }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Subtle Grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--dark-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        [data-theme="light"] .theme-toggle {
            border-color: rgba(0, 0, 0, 0.1);
        }

        .theme-toggle:hover {
            border-color: var(--primary);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text-muted);
            transition: fill 0.3s ease;
        }

        .theme-toggle:hover svg {
            fill: var(--text);
        }

        .theme-toggle .theme-icon-dark {
            display: block;
        }

        .theme-toggle .theme-icon-light {
            display: none;
        }

        [data-theme="light"] .theme-toggle .theme-icon-dark {
            display: none;
        }

        [data-theme="light"] .theme-toggle .theme-icon-light {
            display: block;
        }

        /* Main Content */
        .main-content { 
            position: relative; 
            z-index: 10; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 30px 20px; 
        }

        /* Header with JOGI Branding */
        .header { 
            text-align: center; 
            margin-bottom: 24px; 
        }
        
        .logo-container { 
            display: inline-flex; 
            align-items: center; 
            gap: 16px; 
            margin-bottom: 16px; 
        }
        
        .logo-icon { 
            width: clamp(60px, 12vw, 80px); 
            height: clamp(60px, 12vw, 80px); 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.6rem, 4vw, 2.2rem); 
            font-weight: 700; 
            color: var(--dark); 
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.2);
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 60px rgba(0, 240, 255, 0.6), 0 0 100px rgba(255, 0, 255, 0.35); }
        }
        
        .logo { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 700; 
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--tertiary)); 
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            animation: gradientShift 3s ease infinite; 
        }
        
        @keyframes gradientShift { 
            0%, 100% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
        }
        
        .subtitle { 
            font-size: clamp(0.95rem, 2vw, 1.15rem); 
            color: var(--text-muted); 
            max-width: min(520px, 90vw); 
            margin: 0 auto; 
            line-height: 1.6;
        }
        
        .subtitle span { 
            color: var(--primary); 
            font-weight: 500; 
        }

        /* Chatbot Container */
        .chatbot-container { 
            width: 100%; 
            max-width: min(520px, 95vw); 
            height: min(650px, 75vh); 
            background: var(--dark-card); 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 240, 255, 0.15),
                inset 0 0 80px rgba(0, 240, 255, 0.02);
            position: relative;
        }
        
        /* Animated Border */
        .chatbot-container::before { 
            content: ''; 
            position: absolute; 
            top: -2px; 
            left: -2px; 
            right: -2px; 
            bottom: -2px; 
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--tertiary), var(--primary)); 
            background-size: 400% 400%; 
            border-radius: 26px; 
            z-index: -1; 
            animation: borderFlow 8s ease infinite; 
            opacity: 0.6;
        }
        
        @keyframes borderFlow { 
            0%, 100% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
        }

        /* Chat Header */
        .chatbot-header { 
            padding: 20px 24px; 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 255, 0.04)); 
            border-bottom: 1px solid rgba(0, 240, 255, 0.12); 
            display: flex; 
            align-items: center; 
            gap: 14px; 
        }
        
        .chatbot-avatar { 
            width: clamp(44px, 9vw, 56px); 
            height: clamp(44px, 9vw, 56px); 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Outfit', sans-serif; 
            font-weight: 700; 
            color: var(--dark); 
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
            animation: avatarPulse 2.5s ease-in-out infinite;
        }
        
        @keyframes avatarPulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }
        
        .chatbot-header-info h3 { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.1rem, 2.5vw, 1.35rem); 
            font-weight: 600; 
            color: var(--text); 
            margin-bottom: 4px; 
        }
        
        .chatbot-header-info span { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: clamp(0.7rem, 1.5vw, 0.8rem); 
            color: var(--tertiary); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--tertiary); 
            border-radius: 50%; 
            animation: statusPulse 2s infinite;
        }
        
        @keyframes statusPulse { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6); } 
            50% { box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); } 
        }

        /* Messages Area */
        .chatbot-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            scroll-behavior: smooth; 
        }
        
        .chatbot-messages::-webkit-scrollbar { width: 5px; }
        .chatbot-messages::-webkit-scrollbar-track { background: transparent; }
        .chatbot-messages::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.25); border-radius: 3px; }

        /* Messages */
        .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: clamp(0.85rem, 1.8vw, 0.95rem); 
            line-height: 1.6; 
            animation: messageIn 0.35s ease; 
            white-space: pre-wrap; 
        }
        
        @keyframes messageIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .message.bot { 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 240, 255, 0.04)); 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            border-bottom-left-radius: 6px; 
            color: var(--text); 
            align-self: flex-start; 
        }
        
        .message.bot strong {
            color: var(--primary);
            font-weight: 600;
        }
        
        .message.bot em {
            color: var(--secondary);
        }
        
        .message.bot a.book-link-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--tertiary), var(--primary));
            color: var(--dark);
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .message.bot a.book-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }
        
        .message.user { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-bottom-right-radius: 6px; 
            color: var(--dark); 
            font-weight: 500; 
            align-self: flex-end; 
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.25);
        }

        /* Typing Indicator */
        .message.typing { 
            display: flex; 
            gap: 6px; 
            padding: 18px 22px; 
            background: transparent; 
            border: none; 
        }
        
        .message.typing span { 
            width: 10px; 
            height: 10px; 
            background: var(--primary); 
            border-radius: 50%; 
            animation: typingBounce 1.3s ease-in-out infinite; 
            box-shadow: 0 0 12px var(--primary);
        }
        
        .message.typing span:nth-child(2) { 
            animation-delay: 0.15s; 
            background: var(--secondary); 
            box-shadow: 0 0 12px var(--secondary);
        }
        
        .message.typing span:nth-child(3) { 
            animation-delay: 0.3s; 
            background: var(--tertiary); 
            box-shadow: 0 0 12px var(--tertiary);
        }
        
        @keyframes typingBounce { 
            0%, 60%, 100% { transform: translateY(0); } 
            30% { transform: translateY(-12px); } 
        }

        /* Welcome Screen */
        .chatbot-welcome { 
            text-align: center; 
            padding: 24px; 
        }
        
        .welcome-icon { 
            font-size: clamp(3rem, 10vw, 4.5rem); 
            margin-bottom: 16px; 
            animation: welcomeBounce 2s ease-in-out infinite; 
        }
        
        @keyframes welcomeBounce { 
            0%, 100% { transform: translateY(0) rotate(-3deg); } 
            50% { transform: translateY(-8px) rotate(3deg); } 
        }
        
        .chatbot-welcome h4 { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.3rem, 3vw, 1.6rem); 
            font-weight: 600; 
            color: var(--text); 
            margin-bottom: 12px; 
        }
        
        .chatbot-welcome p { 
            color: var(--text-muted); 
            margin-bottom: 20px; 
            font-size: clamp(0.85rem, 1.8vw, 0.95rem);
            line-height: 1.7;
        }
        
        /* Suggestion Buttons */
        .chatbot-suggestions { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 16px; 
        }
        
        .suggestion-btn { 
            padding: 14px 20px; 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 255, 0.04)); 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            border-radius: 14px; 
            color: var(--primary); 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(0.8rem, 1.6vw, 0.9rem);
            font-weight: 500;
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left;
        }
        
        .suggestion-btn:hover { 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(255, 0, 255, 0.08)); 
            border-color: var(--primary); 
            transform: translateX(6px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.15);
        }
        
        .suggestion-btn.book-btn {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 240, 255, 0.1));
            border-color: var(--tertiary);
            color: var(--tertiary);
        }
        
        .suggestion-btn.book-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 240, 255, 0.15));
            border-color: var(--tertiary);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.25);
        }

        /* Input Area */
        .chatbot-input { 
            padding: 18px 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border-top: 1px solid rgba(0, 240, 255, 0.1); 
            display: flex; 
            gap: 12px; 
        }
        
        .chatbot-input input { 
            flex: 1; 
            padding: 14px 22px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid rgba(0, 240, 255, 0.15); 
            border-radius: 30px; 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            font-size: 0.95rem; 
            transition: all 0.3s ease; 
        }
        
        .chatbot-input input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .chatbot-input input::placeholder { 
            color: var(--text-muted); 
        }
        
        .chatbot-input button { 
            width: 52px; 
            height: 52px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.3s ease; 
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.3);
            flex-shrink: 0;
        }
        
        .chatbot-input button:hover { 
            transform: scale(1.1) rotate(8deg); 
            box-shadow: 0 10px 35px rgba(0, 240, 255, 0.45);
        }
        
        .chatbot-input button svg { 
            width: 22px; 
            height: 22px; 
            fill: var(--dark); 
        }
        
        .voice-btn {
            width: 44px !important;
            height: 44px !important;
            background: rgba(255, 255, 255, 0.1) !important;
            border: 2px solid rgba(0, 240, 255, 0.3) !important;
            flex-shrink: 0;
        }
        
        .voice-btn svg {
            fill: var(--primary) !important;
            width: 20px !important;
            height: 20px !important;
        }
        
        .voice-btn:hover {
            background: rgba(0, 240, 255, 0.2) !important;
            border-color: var(--primary) !important;
        }
        
        .voice-btn.listening {
            background: rgba(255, 0, 100, 0.3) !important;
            border-color: #ff0064 !important;
            animation: micPulse 1s infinite;
        }
        
        .voice-btn.listening svg {
            fill: #ff0064 !important;
        }
        
        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .speak-btn.active {
            background: rgba(0, 255, 136, 0.2) !important;
            border-color: var(--tertiary) !important;
        }
        
        .speak-btn.active svg {
            fill: var(--tertiary) !important;
        }

        /* Back Link */
        .back-link { 
            margin-top: 24px; 
            padding: 14px 32px; 
            background: transparent; 
            border: 1px solid rgba(0, 240, 255, 0.25); 
            border-radius: 30px; 
            color: var(--primary); 
            text-decoration: none; 
            font-family: 'Outfit', sans-serif; 
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease; 
        }
        
        .back-link:hover { 
            background: rgba(0, 240, 255, 0.1); 
            border-color: var(--primary); 
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15);
        }

        /* 3D Floating Elements */
        .chatbot-floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .chat-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
        }

        .chat-orb-1 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, transparent 70%);
            top: 5%;
            left: -50px;
            animation: chatFloat1 25s ease-in-out infinite;
        }

        .chat-orb-2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, transparent 70%);
            top: 40%;
            right: -30px;
            animation: chatFloat2 22s ease-in-out infinite;
        }

        .chat-orb-3 {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            bottom: 10%;
            left: 20%;
            animation: chatFloat3 28s ease-in-out infinite;
        }

        .chat-orb-4 {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 255, 0, 0.06) 0%, transparent 70%);
            top: 20%;
            right: 15%;
            animation: chatFloat4 20s ease-in-out infinite;
        }

        @keyframes chatFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -30px) scale(1.1) rotate(5deg); }
            66% { transform: translate(-20px, 20px) scale(0.95) rotate(-3deg); }
        }

        @keyframes chatFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(-50px, 40px) scale(1.15) rotate(-8deg); }
        }

        @keyframes chatFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(30px, -20px) scale(0.9) rotate(10deg); }
            66% { transform: translate(-20px, -30px) scale(1.05) rotate(-5deg); }
        }

        @keyframes chatFloat4 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, 25px) scale(1.2); }
        }

        /* Mobile */
        @media (max-width: 600px) { 
            .chatbot-container { 
                height: calc(100vh - 100px); 
                max-height: none; 
                border-radius: 20px;
            }
            
            .main-content { 
                padding: 20px 12px; 
            }
            
            .back-link { 
                display: block; 
                text-align: center; 
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>
    <div class="grid-bg"></div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-icon-dark" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        <svg class="theme-icon-light" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM11 17.5c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zM7 13.5h2.5v2.5h-2.5V13.5zm9-6.5h2.5v2.5H16.5V7zM5.99 19.42l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41z"/></svg>
    </button>

    <!-- Floating 3D Elements -->
    <div class="chatbot-floating-elements">
        <div class="chat-orb chat-orb-1"></div>
        <div class="chat-orb chat-orb-2"></div>
        <div class="chat-orb chat-orb-3"></div>
        <div class="chat-orb chat-orb-4"></div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="logo-container">
                <div class="logo-icon">JOGI</div>
                <div class="logo">Ahmad's AI</div>
            </div>
            <p class="subtitle">Meet <span>JOGI</span> — your personal assistant for everything about Ahmad! 🤖</p>
        </div>
        
        <div class="chatbot-container">
            <div class="chatbot-header">
                <div class="chatbot-avatar">JOGI</div>
                <div class="chatbot-header-info">
                    <h3>JOGI 🤖</h3>
                    <span><span class="status-dot"></span> Online & Ready!</span>
                </div>
            </div>
            <div class="chatbot-messages" id="chatbotMessages">
                <div class="chatbot-welcome">
                    <div class="welcome-icon">👋</div>
                    <h4>Hey there! I'm JOGI!</h4>
                    <p>Ahmad's personal AI sidekick! Ask me anything about the boss — his skills, Xynova, or why he's so awesome!</p>
                    <div class="chatbot-suggestions">
                        <button class="suggestion-btn" onclick="sendSuggestion('Who is Muhammad Ahmad?')">👤 Who is the boss?</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('What is Xynova?')">🏢 Tell me about Xynova</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('What are Ahmad superpowers?')">💡 What can he do?</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('Why is Ahmad so cool?')">😎 Why is he awesome?</button>
                        <button class="suggestion-btn book-btn" onclick="window.location.href='/book'">📅 Book a Meeting</button>
                    </div>
                </div>
            </div>
            <div class="chatbot-input">
                <button class="voice-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice Input">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                <input type="text" id="chatInput" placeholder="Ask JOGI anything..." onkeypress="handleEnter(event)">
                <button class="voice-btn speak-btn" id="speakBtn" onclick="toggleSpeak()" title="Voice Output">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← Back to Portfolio</a>
    </div>

    <script>
        let chatHistory = [];
        
        function formatContent(content) {
            // Convert /book links to clickable buttons
            let processed = content.replace(/\/book/g, '<a href="/book" class="book-link-btn">Book a Meeting</a>');
            
            // Convert ## headings to bold spans
            processed = processed.replace(/^## (.+)$/gm, '<strong style="display:block;margin-top:12px;margin-bottom:6px;font-size:1.1em;color:var(--primary);">$1</strong>');
            
            // Convert **text** to bold
            processed = processed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Convert *text* to italic
            processed = processed.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // Convert line breaks to <br>
            processed = processed.replace(/\n/g, '<br>');
            
            return processed;
        }
        
        function addMessage(content, type) {
            const chatbotMessages = document.getElementById('chatbotMessages');
            const welcome = document.querySelector('.chatbot-welcome');
            if (welcome) {
                welcome.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => welcome.remove(), 300);
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + type;
            
            const processedContent = formatContent(content);
            msgDiv.innerHTML = processedContent;
            
            // Add click handlers to book links
            msgDiv.querySelectorAll('.book-link-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = '/book';
                });
            });
            
            chatbotMessages.appendChild(msgDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }
        
        function showTyping() {
            const chatbotMessages = document.getElementById('chatbotMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatbotMessages.appendChild(typingDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function sendSuggestion(msg) {
            document.getElementById('chatInput').value = msg;
            sendMessage();
        }
        
        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const message = chatInput.value.trim();
            if (!message) return;
            
            chatInput.value = '';
            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory })
                });
                
                hideTyping();
                
                if (!response.ok) {
                    addMessage('Oops! Something went wrong! 😅 Try again! - JOGI', 'bot');
                    return;
                }
                
                const data = await response.json();
                addMessage(data.message, 'bot');
                chatHistory.push({ role: 'assistant', content: data.message });
            } catch (error) {
                hideTyping();
                addMessage('Connection issue! 📶 Try again! - JOGI', 'bot');
            }
        }
        
        // Voice Input (Speech Recognition)
        let recognition = null;
        let isListening = false;
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('listening');
            };
            
            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('listening');
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('chatInput').value = transcript;
                sendMessage();
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isListening = false;
                document.getElementById('micBtn').classList.remove('listening');
            };
        }
        
        function toggleVoiceInput() {
            if (!recognition) {
                addMessage("Voice input not supported in this browser. Try Chrome! 🎤", 'bot');
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }
        
        // Voice Output (Text-to-Speech)
        let speakEnabled = false;
        let speechSynthesis = window.speechSynthesis;
        let voicesLoaded = false;
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { voicesLoaded = true; };
        }
        
        function toggleSpeak() {
            speakEnabled = !speakEnabled;
            const btn = document.getElementById('speakBtn');
            btn.classList.toggle('active', speakEnabled);
        }
        
        function speakText(text) {
            if (!speakEnabled) return;
            
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            if (voicesLoaded) {
                const voices = speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
                if (englishVoice) utterance.voice = englishVoice;
            }
            
            speechSynthesis.speak(utterance);
        }
        
        // Override addMessage to speak bot responses
        const originalAddMessage = addMessage;
        addMessage = function(content, type) {
            originalAddMessage(content, type);
            if (type === 'bot') {
                // Clean HTML tags for speech
                const textOnly = content.replace(/<[^>]*>/g, '').replace(/[*#]/g, '');
                speakText(textOnly);
            }
        };
        
        const style = document.createElement('style');
        style.textContent = '@keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }';
        document.head.appendChild(style);

        // Theme Toggle
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const STORAGE_KEY = 'portfolio-theme';
            const DARK = 'dark';
            const LIGHT = 'light';

            function getSystemTheme() {
                return window.matchMedia('(prefers-color-scheme: light)').matches ? LIGHT : DARK;
            }

            function getStoredTheme() {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored === LIGHT || stored === DARK ? stored : null;
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem(STORAGE_KEY, theme);
            }

            function initTheme() {
                const stored = getStoredTheme();
                setTheme(stored || getSystemTheme());
            }

            function toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme') || DARK;
                setTheme(current === DARK ? LIGHT : DARK);
            }

            initTheme();
            if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        })();
    </script>
</body>
</html>
