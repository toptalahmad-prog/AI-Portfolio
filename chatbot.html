<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Muhammad Ahmad Humayoun</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #00f0ff; 
            --secondary: #ff00ff; 
            --tertiary: #00ff88; 
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --text: #ffffff;
            --text-muted: #a0a0b0;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            min-height: 100vh; 
            overflow: hidden; 
            color: var(--text); 
            user-select: none; 
        }
        
        /* Ambient Background Glows */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation: floatGlow 15s ease-in-out infinite;
        }
        .glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.12) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation: floatGlow 18s ease-in-out infinite reverse;
        }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Subtle Grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Main Content */
        .main-content { 
            position: relative; 
            z-index: 10; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 30px 20px; 
        }

        /* Header with JOGI Branding */
        .header { 
            text-align: center; 
            margin-bottom: 24px; 
        }
        
        .logo-container { 
            display: inline-flex; 
            align-items: center; 
            gap: 16px; 
            margin-bottom: 16px; 
        }
        
        .logo-icon { 
            width: clamp(60px, 12vw, 80px); 
            height: clamp(60px, 12vw, 80px); 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.6rem, 4vw, 2.2rem); 
            font-weight: 700; 
            color: var(--dark); 
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.2);
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 60px rgba(0, 240, 255, 0.6), 0 0 100px rgba(255, 0, 255, 0.35); }
        }
        
        .logo { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 700; 
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--tertiary)); 
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            animation: gradientShift 3s ease infinite; 
        }
        
        @keyframes gradientShift { 
            0%, 100% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
        }
        
        .subtitle { 
            font-size: clamp(0.95rem, 2vw, 1.15rem); 
            color: var(--text-muted); 
            max-width: min(520px, 90vw); 
            margin: 0 auto; 
            line-height: 1.6;
        }
        
        .subtitle span { 
            color: var(--primary); 
            font-weight: 500; 
        }

        /* Chatbot Container */
        .chatbot-container { 
            width: 100%; 
            max-width: min(520px, 95vw); 
            height: min(650px, 75vh); 
            background: var(--dark-card); 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 240, 255, 0.15),
                inset 0 0 80px rgba(0, 240, 255, 0.02);
            position: relative;
        }
        
        /* Animated Border */
        .chatbot-container::before { 
            content: ''; 
            position: absolute; 
            top: -2px; 
            left: -2px; 
            right: -2px; 
            bottom: -2px; 
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--tertiary), var(--primary)); 
            background-size: 400% 400%; 
            border-radius: 26px; 
            z-index: -1; 
            animation: borderFlow 8s ease infinite; 
            opacity: 0.6;
        }
        
        @keyframes borderFlow { 
            0%, 100% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
        }

        /* Chat Header */
        .chatbot-header { 
            padding: 20px 24px; 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 255, 0.04)); 
            border-bottom: 1px solid rgba(0, 240, 255, 0.12); 
            display: flex; 
            align-items: center; 
            gap: 14px; 
        }
        
        .chatbot-avatar { 
            width: clamp(44px, 9vw, 56px); 
            height: clamp(44px, 9vw, 56px); 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Outfit', sans-serif; 
            font-weight: 700; 
            color: var(--dark); 
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
            animation: avatarPulse 2.5s ease-in-out infinite;
        }
        
        @keyframes avatarPulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }
        
        .chatbot-header-info h3 { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.1rem, 2.5vw, 1.35rem); 
            font-weight: 600; 
            color: var(--text); 
            margin-bottom: 4px; 
        }
        
        .chatbot-header-info span { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: clamp(0.7rem, 1.5vw, 0.8rem); 
            color: var(--tertiary); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--tertiary); 
            border-radius: 50%; 
            animation: statusPulse 2s infinite;
        }
        
        @keyframes statusPulse { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6); } 
            50% { box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); } 
        }

        /* Messages Area */
        .chatbot-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            scroll-behavior: smooth; 
        }
        
        .chatbot-messages::-webkit-scrollbar { width: 5px; }
        .chatbot-messages::-webkit-scrollbar-track { background: transparent; }
        .chatbot-messages::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.25); border-radius: 3px; }

        /* Messages */
        .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: clamp(0.85rem, 1.8vw, 0.95rem); 
            line-height: 1.6; 
            animation: messageIn 0.35s ease; 
            white-space: pre-wrap; 
        }
        
        @keyframes messageIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .message.bot { 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 240, 255, 0.04)); 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            border-bottom-left-radius: 6px; 
            color: var(--text); 
            align-self: flex-start; 
        }
        
        .message.user { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-bottom-right-radius: 6px; 
            color: var(--dark); 
            font-weight: 500; 
            align-self: flex-end; 
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.25);
        }

        /* Typing Indicator */
        .message.typing { 
            display: flex; 
            gap: 6px; 
            padding: 18px 22px; 
            background: transparent; 
            border: none; 
        }
        
        .message.typing span { 
            width: 10px; 
            height: 10px; 
            background: var(--primary); 
            border-radius: 50%; 
            animation: typingBounce 1.3s ease-in-out infinite; 
            box-shadow: 0 0 12px var(--primary);
        }
        
        .message.typing span:nth-child(2) { 
            animation-delay: 0.15s; 
            background: var(--secondary); 
            box-shadow: 0 0 12px var(--secondary);
        }
        
        .message.typing span:nth-child(3) { 
            animation-delay: 0.3s; 
            background: var(--tertiary); 
            box-shadow: 0 0 12px var(--tertiary);
        }
        
        @keyframes typingBounce { 
            0%, 60%, 100% { transform: translateY(0); } 
            30% { transform: translateY(-12px); } 
        }

        /* Welcome Screen */
        .chatbot-welcome { 
            text-align: center; 
            padding: 24px; 
        }
        
        .welcome-icon { 
            font-size: clamp(3rem, 10vw, 4.5rem); 
            margin-bottom: 16px; 
            animation: welcomeBounce 2s ease-in-out infinite; 
        }
        
        @keyframes welcomeBounce { 
            0%, 100% { transform: translateY(0) rotate(-3deg); } 
            50% { transform: translateY(-8px) rotate(3deg); } 
        }
        
        .chatbot-welcome h4 { 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(1.3rem, 3vw, 1.6rem); 
            font-weight: 600; 
            color: var(--text); 
            margin-bottom: 12px; 
        }
        
        .chatbot-welcome p { 
            color: var(--text-muted); 
            margin-bottom: 20px; 
            font-size: clamp(0.85rem, 1.8vw, 0.95rem);
            line-height: 1.7;
        }
        
        /* Suggestion Buttons */
        .chatbot-suggestions { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 16px; 
        }
        
        .suggestion-btn { 
            padding: 14px 20px; 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 255, 0.04)); 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            border-radius: 14px; 
            color: var(--primary); 
            font-family: 'Outfit', sans-serif; 
            font-size: clamp(0.8rem, 1.6vw, 0.9rem);
            font-weight: 500;
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left;
        }
        
        .suggestion-btn:hover { 
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(255, 0, 255, 0.08)); 
            border-color: var(--primary); 
            transform: translateX(6px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.15);
        }

        /* Input Area */
        .chatbot-input { 
            padding: 18px 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border-top: 1px solid rgba(0, 240, 255, 0.1); 
            display: flex; 
            gap: 12px; 
        }
        
        .chatbot-input input { 
            flex: 1; 
            padding: 14px 22px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid rgba(0, 240, 255, 0.15); 
            border-radius: 30px; 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            font-size: 0.95rem; 
            transition: all 0.3s ease; 
        }
        
        .chatbot-input input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .chatbot-input input::placeholder { 
            color: var(--text-muted); 
        }
        
        .chatbot-input button { 
            width: 52px; 
            height: 52px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.3s ease; 
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.3);
            flex-shrink: 0;
        }
        
        .chatbot-input button:hover { 
            transform: scale(1.1) rotate(8deg); 
            box-shadow: 0 10px 35px rgba(0, 240, 255, 0.45);
        }
        
        .chatbot-input button svg { 
            width: 22px; 
            height: 22px; 
            fill: var(--dark); 
        }

        /* Back Link */
        .back-link { 
            margin-top: 24px; 
            padding: 14px 32px; 
            background: transparent; 
            border: 1px solid rgba(0, 240, 255, 0.25); 
            border-radius: 30px; 
            color: var(--primary); 
            text-decoration: none; 
            font-family: 'Outfit', sans-serif; 
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease; 
        }
        
        .back-link:hover { 
            background: rgba(0, 240, 255, 0.1); 
            border-color: var(--primary); 
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15);
        }

        /* Mobile */
        @media (max-width: 600px) { 
            .chatbot-container { 
                height: calc(100vh - 100px); 
                max-height: none; 
                border-radius: 20px;
            }
            
            .main-content { 
                padding: 20px 12px; 
            }
            
            .back-link { 
                display: block; 
                text-align: center; 
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>
    <div class="grid-bg"></div>

    <div class="main-content">
        <div class="header">
            <div class="logo-container">
                <div class="logo-icon">JOGI</div>
                <div class="logo">Ahmad's AI</div>
            </div>
            <p class="subtitle">Meet <span>JOGI</span> — your personal assistant for everything about Ahmad! 🤖</p>
        </div>
        
        <div class="chatbot-container">
            <div class="chatbot-header">
                <div class="chatbot-avatar">JOGI</div>
                <div class="chatbot-header-info">
                    <h3>JOGI 🤖</h3>
                    <span><span class="status-dot"></span> Online & Ready!</span>
                </div>
            </div>
            <div class="chatbot-messages" id="chatbotMessages">
                <div class="chatbot-welcome">
                    <div class="welcome-icon">👋</div>
                    <h4>Hey there! I'm JOGI!</h4>
                    <p>Ahmad's personal AI sidekick! Ask me anything about the boss — his skills, Xynova, or why he's so awesome!</p>
                    <div class="chatbot-suggestions">
                        <button class="suggestion-btn" onclick="sendSuggestion('Who is Muhammad Ahmad?')">👤 Who is the boss?</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('What is Xynova?')">🏢 Tell me about Xynova</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('What are Ahmad superpowers?')">💡 What can he do?</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('Why is Ahmad so cool?')">😎 Why is he awesome?</button>
                    </div>
                </div>
            </div>
            <div class="chatbot-input">
                <input type="text" id="chatInput" placeholder="Ask JOGI anything..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
        
        <a href="index.html" class="back-link">← Back to Portfolio</a>
    </div>

    <script>
        let chatHistory = [];
        
        function addMessage(content, type) {
            const chatbotMessages = document.getElementById('chatbotMessages');
            const welcome = document.querySelector('.chatbot-welcome');
            if (welcome) {
                welcome.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => welcome.remove(), 300);
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = content;
            chatbotMessages.appendChild(msgDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }
        
        function showTyping() {
            const chatbotMessages = document.getElementById('chatbotMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatbotMessages.appendChild(typingDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function sendSuggestion(msg) {
            document.getElementById('chatInput').value = msg;
            sendMessage();
        }
        
        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const message = chatInput.value.trim();
            if (!message) return;
            
            chatInput.value = '';
            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory })
                });
                
                hideTyping();
                
                if (!response.ok) {
                    addMessage('Oops! Something went wrong! 😅 Try again! - JOGI', 'bot');
                    return;
                }
                
                const data = await response.json();
                addMessage(data.message, 'bot');
                chatHistory.push({ role: 'assistant', content: data.message });
            } catch (error) {
                hideTyping();
                addMessage('Connection issue! 📶 Try again! - JOGI', 'bot');
            }
        }
        
        const style = document.createElement('style');
        style.textContent = '@keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }';
        document.head.appendChild(style);
    </script>
</body>
</html>
