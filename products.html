<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Shop Now</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.15);
            --secondary: #ff00ff;
            --secondary-dim: rgba(255, 0, 255, 0.12);
            --dark: #080808;
            --dark-surface: #0c0c0c;
            --dark-card: #111111;
            --text: #f5f5f5;
            --text-muted: #8a8a8a;
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(0, 240, 255, 0.2);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px clamp(24px, 5vw, 60px);
            background: linear-gradient(180deg, rgba(8, 8, 8, 0.98) 0%, rgba(8, 8, 8, 0.9) 100%);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--text);
        }
        
        .logo span { color: var(--primary); }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }
        
        /* Main Content */
        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 clamp(20px, 4vw, 60px);
        }
        
        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 240, 255, 0.08) 0%, transparent 60%);
        }
        
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--text), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Search Bar */
        .search-section {
            padding: 20px 0 40px;
        }
        
        .search-bar {
            display: flex;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .search-bar input {
            flex: 1;
            padding: 16px 24px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }
        
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
        }
        
        .search-bar button {
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: var(--dark);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px 0;
        }
        
        .filter-select {
            padding: 12px 20px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            min-width: 150px;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .results-info {
            text-align: center;
            color: var(--text-muted);
            padding: 15px 0;
            font-size: 0.95rem;
        }
        
        .results-info strong {
            color: var(--primary);
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0 40px;
        }
        
        .product-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 240, 255, 0.1);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: var(--dark-surface);
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-brand {
            font-size: 0.75rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        
        .product-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-price {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .product-price .currency {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 40px 0;
            flex-wrap: wrap;
        }
        
        .pagination button {
            padding: 12px 20px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .pagination button.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }
        
        .pagination .per-page {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
        }
        
        .pagination .per-page select {
            padding: 10px 15px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* No Results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        
        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        /* Product Modal */
        .product-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            overflow-y: auto;
            padding: 40px 20px;
        }
        
        .product-modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }
        
        .modal-info {
            padding: 30px;
        }
        
        .modal-brand {
            font-size: 0.8rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .modal-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin: 10px 0 20px;
        }
        
        .modal-price {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .modal-description {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 25px;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .search-bar {
                flex-direction: column;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            
            .product-image {
                height: 180px;
            }
            
            .pagination {
                gap: 8px;
            }
            
            .pagination button {
                padding: 10px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">SHOP<span>NOW</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html" class="active">Products</a></li>
            <li><a href="chatbot.html">JOGI AI</a></li>
            <li><a href="saleborg.html">SaleBorg</a></li>
            <li><a href="book.html">Book Meeting</a></li>
        </ul>
    </header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="hero">
            <h1>Discover Premium Products</h1>
            <p>Browse our curated collection of beauty & cosmetics</p>
        </div>
        
        <div class="container">
            <!-- Search -->
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products, brands, categories...">
                    <button onclick="performSearch()">Search</button>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="filters">
                <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
                    <option value="">All Categories</option>
                </select>
                <select class="filter-select" id="brandFilter" onchange="applyFilters()">
                    <option value="">All Brands</option>
                </select>
                <select class="filter-select" id="sortFilter" onchange="applyFilters()">
                    <option value="price_desc">Price: High to Low</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="name">Name: A-Z</option>
                </select>
            </div>
            
            <div class="results-info" id="resultsInfo"></div>
            
            <!-- Products Grid -->
            <div class="products-grid" id="productsGrid"></div>
            
            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Loading products...</p>
            </div>
            
            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <h3>No products found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </main>
    
    <!-- Product Modal -->
    <div class="product-modal" id="productModal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <script>
        let currentPage = 0;
        let perPage = 50;
        let totalProducts = 0;
        let currentSearch = '';
        let currentCategory = '';
        let currentBrand = '';
        
        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const loading = document.getElementById('loading');
            const noResults = document.getElementById('noResults');
            const resultsInfo = document.getElementById('resultsInfo');
            
            loading.style.display = 'block';
            grid.innerHTML = '';
            noResults.style.display = 'none';
            
            try {
                let url = `/api/products?limit=${perPage}&offset=${currentPage * perPage}`;
                if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
                if (currentCategory) url += `&category=${encodeURIComponent(currentCategory)}`;
                if (currentBrand) url += `&brand=${encodeURIComponent(currentBrand)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                totalProducts = data.total;
                
                resultsInfo.innerHTML = `Showing <strong>${data.products.length}</strong> of <strong>${totalProducts.toLocaleString()}</strong> products`;
                
                if (data.products.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    data.products.forEach(product => {
                        grid.innerHTML += createProductCard(product);
                    });
                }
                
                renderPagination();
            } catch (e) {
                console.error('Error loading products:', e);
                noResults.style.display = 'block';
                noResults.innerHTML = '<h3>Error loading products</h3><p>Please try again later</p>';
            }
            
            loading.style.display = 'none';
        }
        
        function createProductCard(product) {
            const price = product.updated_price || product.price || 0;
            const name = product.name_en || product.name_ar || 'Product';
            const brand = product.brand_en || product.brand || '';
            const image = product.picture || '';
            
            return `
                <div class="product-card" onclick="showProduct(${product.id})">
                    <img src="${image}" alt="${name}" class="product-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23111111%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2212%22>No Image</text></svg>'">
                    <div class="product-info">
                        ${brand ? `<div class="product-brand">${brand}</div>` : ''}
                        <div class="product-name">${name}</div>
                        <div class="product-price">${price.toLocaleString()} <span class="currency">IQD</span></div>
                    </div>
                </div>
            `;
        }
        
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(totalProducts / perPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // Previous button
            html += `<button ${currentPage === 0 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">← Prev</button>`;
            
            // Page numbers
            const maxPages = 7;
            let startPage = Math.max(0, currentPage - Math.floor(maxPages / 2));
            let endPage = Math.min(totalPages, startPage + maxPages);
            
            if (endPage - startPage < maxPages) {
                startPage = Math.max(0, endPage - maxPages);
            }
            
            if (startPage > 0) {
                html += `<button onclick="changePage(0)">1</button>`;
                if (startPage > 1) html += `<span style="color: var(--text-muted)">...</span>`;
            }
            
            for (let i = startPage; i < endPage; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i + 1}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span style="color: var(--text-muted)">...</span>`;
                html += `<button onclick="changePage(${totalPages - 1})">${totalPages}</button>`;
            }
            
            // Next button
            html += `<button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next →</button>`;
            
            // Per page selector
            html += `
                <div class="per-page">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Per page:</span>
                    <select onchange="changePerPage(this.value)">
                        <option value="50" ${perPage === 50 ? 'selected' : ''}>50</option>
                        <option value="100" ${perPage === 100 ? 'selected' : ''}>100</option>
                        <option value="300" ${perPage === 300 ? 'selected' : ''}>300</option>
                        <option value="500" ${perPage === 500 ? 'selected' : ''}>500</option>
                    </select>
                </div>
            `;
            
            pagination.innerHTML = html;
        }
        
        function changePage(page) {
            currentPage = page;
            loadProducts();
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }
        
        function changePerPage(value) {
            perPage = parseInt(value);
            currentPage = 0;
            loadProducts();
        }
        
        function performSearch() {
            currentSearch = document.getElementById('searchInput').value.trim();
            currentPage = 0;
            loadProducts();
        }
        
        function applyFilters() {
            currentCategory = document.getElementById('categoryFilter').value;
            currentBrand = document.getElementById('brandFilter').value;
            currentPage = 0;
            loadProducts();
        }
        
        // Enter key for search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        async function showProduct(id) {
            try {
                const response = await fetch(`/api/products/${id}`);
                const product = await response.json();
                
                const modal = document.getElementById('productModal');
                const content = document.getElementById('modalContent');
                
                const price = product.updated_price || product.price || 0;
                const nameEn = product.name_en || '';
                const nameAr = product.name_ar || '';
                const brand = product.brand_en || product.brand || '';
                const descEn = product.description_en || '';
                const descAr = product.description_ar || '';
                const image = product.picture || '';
                
                content.innerHTML = `
                    <img src="${image}" alt="${nameEn}" class="modal-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23111111%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2212%22>No Image</text></svg>'">
                    <div class="modal-info">
                        ${brand ? `<div class="modal-brand">${brand}</div>` : ''}
                        <h2 class="modal-name">${nameEn}</h2>
                        ${nameAr ? `<p style="color: var(--text-muted); margin-bottom: 15px;">${nameAr}</p>` : ''}
                        <div class="modal-price">${price.toLocaleString()} IQD</div>
                        ${descEn ? `<p class="modal-description">${descEn}</p>` : ''}
                        ${descAr ? `<p class="modal-description" style="margin-top: 15px;">${descAr}</p>` : ''}
                    </div>
                `;
                
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            } catch (e) {
                console.error('Error loading product:', e);
            }
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
            document.body.style.overflow = '';
        }
        
        // Close modal on background click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') closeModal();
        });
        
        // Load filters
        async function loadFilters() {
            try {
                const [catRes, brandRes] = await Promise.all([
                    fetch('/api/products/categories'),
                    fetch('/api/products/brands')
                ]);
                
                const categories = await catRes.json();
                const brands = await brandRes.json();
                
                const catSelect = document.getElementById('categoryFilter');
                categories.forEach(cat => {
                    if (cat) catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
                });
                
                const brandSelect = document.getElementById('brandFilter');
                brands.slice(0, 50).forEach(brand => {
                    if (brand) brandSelect.innerHTML += `<option value="${brand}">${brand}</option>`;
                });
            } catch (e) {
                console.error('Error loading filters:', e);
            }
        }
        
        // Initialize
        loadFilters();
        loadProducts();
    </script>
</body>
</html>
